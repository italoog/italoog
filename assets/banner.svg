<svg xmlns="http://www.w3.org/2000/svg" width="900" height="190" viewBox="0 0 900 190">
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#F7B731" opacity="0.09"/>
    </pattern>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A0E17;stop-opacity:1"/>
      <stop offset="75%" style="stop-color:#0A0E17;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0A0E17;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="190" fill="#0A0E17"/>
  <rect width="900" height="190" fill="url(#dots)"/>
  <rect width="900" height="190" fill="url(#fade)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="190" fill="#F7B731"/>

  <!-- Name -->
  <text x="32" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="bold" fill="#E8EAED" letter-spacing="-1">&#205;talo Gomes</text>

  <!-- Subtitle -->
  <text x="34" y="127" font-family="'Courier New', Courier, monospace" font-size="13" fill="#F7B731" letter-spacing="4">FRONTEND ENGINEER &#183; UI CRAFTSMAN &#183; BRASIL</text>

  <!-- Accent line -->
  <rect x="34" y="145" width="330" height="1" fill="#F7B731" opacity="0.35"/>

  <!-- Background code glyph -->
  <text x="835" y="118" font-family="'Courier New', monospace" font-size="96" fill="#F7B731" opacity="0.04" text-anchor="middle">&lt;/&gt;</text>
</svg>
